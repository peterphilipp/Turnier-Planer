version: '3.8'
services:
  app:
    image: ghcr.io/peterphilipp/turnier-planer:latest
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "file:./data/dev.db"
      # RESEND_API_KEY: "<dein-resend-api-key-hier>"  // Siehe .env.example
      FRONTEND_URL: "https://turnier-planer.mygate.dedyn.io"
    volumes:
      - db-data:/app/data

volumes:
  db-data:
