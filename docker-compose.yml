version: '3.8'
services:
  app:
    image: ghcr.io/peterphilipp/turnier-planer:latest
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "file:./prisma/data/dev.db"

      FRONTEND_URL: "https://turnier-planer.mygate.dedyn.io"
    volumes:
      - db-data:/app/prisma/data

volumes:
  db-data:
